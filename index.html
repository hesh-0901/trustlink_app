<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>TrustLink</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: "#1E2BE0",
        primaryDark: "#0F1ACD",
        accent: "#3D4BFF",
        background: "#EEF2FF",
        textMuted: "#6B7280",
        borderLight: "#E5E7EB"
      }
    }
  }
}
</script>

<script type="module" src="/trustlink_app/js/firebase-init.js"></script>
<script type="module" src="/trustlink_app/main_js/login.js"></script>

<style>

/* Glass Premium */
.glass-card {
  backdrop-filter: blur(25px);
  background: rgba(255,255,255,0.96);
  box-shadow: 0 40px 100px rgba(30,43,224,0.12);
}

/* Premium Input */
.input-field {
  transition: all 0.25s ease;
}
.input-field:focus {
  box-shadow: 0 0 0 3px rgba(30,43,224,0.15);
}

/* Button */
.btn-primary {
  transition: all 0.25s ease;
}
.btn-primary:active {
  transform: scale(0.97);
}

/* Spinner */
.spinner {
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top: 2px solid white;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Shake */
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}
.shake { animation: shake 0.4s ease; }

input { font-size: 16px !important; }

</style>
</head>

<body class="min-h-screen bg-background flex items-center justify-center px-4">

<div id="loginCard" class="w-full max-w-sm glass-card rounded-3xl p-8 border border-borderLight">

  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-primary to-accent flex items-center justify-center shadow-xl">
      <img src="/trustlink_app/assets/white.logo.png" class="h-7">
    </div>

    <h1 class="text-2xl font-bold text-primary">
      TrustLink
    </h1>

    <p class="text-textMuted mt-2">
      Connectez-vous à votre espace sécurisé
    </p>
  </div>

  <form id="loginForm" class="space-y-6" autocomplete="off">

    <!-- PHONE -->
    <div>
      <label class="block text-sm font-medium mb-2">
        Numéro de téléphone
      </label>
      <div class="relative">
        <i class="bi bi-phone absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
        <input
          id="phone"
          type="text"
          required
          placeholder="+243..."
          class="input-field w-full border border-borderLight rounded-xl pl-10 pr-4 py-3 focus:outline-none"
        />
      </div>
    </div>

    <!-- PASSWORD -->
    <div>
      <label class="block text-sm font-medium mb-2">
        Mot de passe
      </label>
      <div class="relative">
        <i class="bi bi-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
        <input
          id="password"
          type="password"
          required
          placeholder="••••••••"
          class="input-field w-full border border-borderLight rounded-xl pl-10 pr-10 py-3 focus:outline-none"
        />
        <button
          type="button"
          id="togglePassword"
          class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"
        >
          <i class="bi bi-eye"></i>
        </button>
      </div>
    </div>

    <!-- REMEMBER + FORGOT -->
    <div class="flex items-center justify-between text-sm">

      <label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox" id="rememberMe" class="w-4 h-4 accent-primary">
        <span class="text-textMuted">Se souvenir</span>
      </label>

      <a href="#" class="text-primary font-medium hover:underline">
        Mot de passe oublié ?
      </a>

    </div>

    <!-- BUTTON -->
    <button
      id="loginBtn"
      type="submit"
      class="btn-primary w-full bg-gradient-to-r from-primary to-accent text-white font-semibold py-3 rounded-xl shadow-lg flex items-center justify-center gap-2"
    >
      <span id="btnText">Se connecter</span>
    </button>

    <p id="errorMsg" class="text-red-500 text-sm text-center hidden"></p>

  </form>

  <!-- REGISTER -->
  <div class="text-center mt-6 text-sm text-textMuted">
    Pas encore de compte ?
    <a href="/trustlink_app/public/register.html"
       class="text-primary font-semibold hover:underline">
       S’enregistrer
    </a>
  </div>

</div>

<script>
const togglePassword = document.getElementById("togglePassword");
const passwordInput = document.getElementById("password");

togglePassword.addEventListener("click", () => {
  const type = passwordInput.type === "password" ? "text" : "password";
  passwordInput.type = type;
  togglePassword.innerHTML =
    type === "password"
      ? '<i class="bi bi-eye"></i>'
      : '<i class="bi bi-eye-slash"></i>';
});
</script>

</body>
</html>
