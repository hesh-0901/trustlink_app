<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virement - TrustLink</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<script type="module" src="/trustlink_app/js/firebase-init.js"></script>
<script type="module" src="/trustlink_app/js/transferer.js"></script>
<script type="module" src="/trustlink_app/main_js/layout.js"></script>

</head>

<body class="bg-gray-50 min-h-screen flex flex-col">

<div id="header-container"
     class="fixed top-0 left-0 w-full z-50 bg-white shadow-sm"></div>

<main class="flex-1 pt-20 pb-28 px-4 max-w-md mx-auto w-full space-y-6">

<h1 class="text-xl font-semibold text-gray-800">
Nouveau virement
</h1>

<!-- WALLET CARD -->
<div id="walletCard"
class="bg-gradient-to-br from-indigo-900 via-blue-800 to-blue-600
text-white p-6 rounded-2xl shadow-xl relative overflow-hidden">

<div class="flex justify-between items-center">
<span id="walletCurrency" class="text-sm opacity-90"></span>
<i class="bi bi-credit-card-2-front text-lg"></i>
</div>

<div id="walletBalance"
class="text-3xl font-bold mt-2">0</div>

<div class="text-xs text-white/60 mt-3 space-y-1">
<div>Réservé:
<span id="walletReserved"
class="font-medium text-white/70">0</span></div>
<div>Disponible:
<span id="walletAvailable"
class="font-medium text-white">0</span></div>
</div>

</div>

<!-- SELECT WALLET -->
<select id="walletSelect"
class="w-full border rounded-xl px-4 py-3 bg-white shadow-sm">
<option value="">Choisir un compte</option>
</select>

<!-- MODE -->
<div class="flex gap-3">
<button id="modeFriend"
class="flex-1 bg-blue-600 text-white py-2 rounded-xl text-sm">
Envoyer à un ami
</button>

<button id="modeManual"
class="flex-1 bg-gray-200 text-gray-600 py-2 rounded-xl text-sm">
Adresse wallet
</button>
</div>

<!-- FRIEND SELECT -->
<div id="friendSection">
<select id="beneficiarySelect"
class="w-full border rounded-xl px-4 py-3 bg-white shadow-sm">
<option value="">Choisir un bénéficiaire</option>
</select>

<div id="friendPreview"
class="hidden bg-white rounded-2xl p-4 shadow-sm flex items-center gap-4 mt-3">

<img id="friendAvatar"
class="w-14 h-14 rounded-full object-cover">

<div>
<div id="friendName"
class="font-semibold text-gray-800"></div>
<div id="friendUsername"
class="text-xs text-gray-500"></div>
</div>

</div>
</div>

<!-- MANUAL -->
<div id="manualSection" class="hidden">
<input type="text"
id="manualWallet"
placeholder="Adresse wallet"
class="w-full border rounded-xl px-4 py-3 bg-white shadow-sm">
</div>

<!-- AMOUNT -->
<div class="relative">
<input type="number"
id="amount"
placeholder="Montant"
class="w-full border rounded-xl px-4 py-3 bg-white shadow-sm">
<span id="currencyTag"
class="absolute right-4 top-1/2 -translate-y-1/2 text-sm text-gray-500"></span>
</div>

<p id="errorMsg"
class="text-red-500 text-sm hidden"></p>

<button id="confirmBtn"
class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold active:scale-95 transition">
Confirmer le virement
</button>

</main>

<!-- LOADING -->
<div id="loadingOverlay"
class="fixed inset-0 bg-black/40 hidden flex items-center justify-center z-50">
<div class="bg-white p-6 rounded-2xl shadow-lg text-center space-y-3">
<div class="animate-spin w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full mx-auto"></div>
<p class="text-sm text-gray-600">Transaction en cours...</p>
</div>
</div>

<div id="navbar-container"
class="fixed bottom-0 left-0 w-full z-50 bg-white shadow-inner"></div>

</body>
</html>
