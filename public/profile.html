<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil - TrustLink</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body class="bg-[#EEF2FF] min-h-screen">

  <main class="max-w-md mx-auto py-8 px-5 space-y-6">

    <!-- PROFILE CARD -->
    <div class="bg-white rounded-3xl shadow-sm overflow-hidden">

        <div class="h-36 relative">
          <img src="/trustlink_app/assets/trl.jpg"
               class="w-full h-full object-cover">
          <div class="absolute inset-0 bg-black/30"></div>
        </div>

      <div class="relative flex flex-col items-center pb-6 -mt-14">

        <div class="relative">
          <img id="profile-avatar"
               class="w-24 h-24 rounded-full border-4 border-white shadow-md bg-gray-100 object-cover"
               src="">

          <button id="edit-avatar-btn"
                  class="absolute bottom-0 right-0 
                         bg-[#1E2BE0] text-white 
                         w-8 h-8 rounded-full 
                         flex items-center justify-center 
                         shadow-md active:scale-95 transition">
            <i class="bi bi-pencil text-xs"></i>
          </button>
        </div>

        <h2 id="profile-name"
            class="mt-3 font-semibold text-sm"></h2>

        <p id="profile-username"
           class="text-xs text-gray-500"></p>

      </div>
    </div>

    <!-- PERSONAL INFO -->
    <div class="bg-white rounded-3xl shadow-sm p-5 space-y-4 text-sm">

      <div class="flex justify-between">
        <span class="text-gray-500">Téléphone</span>
        <span id="profile-phone"></span>
      </div>

      <div class="flex justify-between">
        <span class="text-gray-500">Genre</span>
        <span id="profile-gender"></span>
      </div>

      <div class="flex justify-between">
        <span class="text-gray-500">Naissance</span>
        <span id="profile-birth"></span>
      </div>

      <div class="flex justify-between">
        <span class="text-gray-500">Wallet Base</span>
        <span id="profile-wallet"></span>
      </div>
    </div>

    <!-- FRIENDS -->
<div class="bg-white rounded-3xl shadow-sm p-5 space-y-4">

  <div class="flex justify-between items-center">
    <div>
      <h2 class="text-sm font-semibold text-[#1E2BE0]">
        Amis
      </h2>
      <p id="friends-count"
         class="text-xs text-gray-400 mt-1">
        0 amis
      </p>
    </div>
    <span class="text-xs text-gray-400">
      Bénéficiaires
    </span>
  </div>

  <div id="friendsList" class="space-y-3"></div>
</div>

<!-- FRIEND MODAL -->
<div id="friend-modal"
     class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden 
            flex items-end sm:items-center justify-center z-50">

  <div class="bg-white w-full sm:max-w-md 
              rounded-t-3xl sm:rounded-3xl 
              overflow-hidden shadow-xl 
              animate-slideUp">

    <!-- COVER -->
    <div class="relative h-32 sm:h-36">
      <img id="friend-cover"
           src="/trustlink_app/assets/trl.jpg"
           class="w-full h-full object-cover">
      <div class="absolute inset-0 bg-black/30"></div>
    </div>

    <!-- AVATAR -->
    <div class="relative flex flex-col items-center -mt-14 px-5 pb-6">

      <img id="friend-avatar"
           class="w-24 h-24 rounded-full border-4 border-white shadow-lg object-cover bg-gray-100">

      <h2 id="friend-name"
          class="mt-3 font-semibold text-sm text-gray-800"></h2>

      <p id="friend-username"
         class="text-xs text-gray-500"></p>

      <!-- WALLET CARDS -->
                <!-- INFOS PRINCIPALES -->
          <div class="w-full mt-5 space-y-3 text-xs">
          
            <!-- NUMERO WALLET -->
            <div class="bg-gray-50 rounded-xl p-3 flex justify-between items-center">
              <div>
                <p class="text-gray-400">Numéro Wallet</p>
                <p id="friend-wallet"
                   class="font-medium text-gray-800"></p>
              </div>
              <button data-copy="friend-wallet"
                      class="copy-btn text-gray-400 hover:text-[#1E2BE0] transition">
                <i class="bi bi-copy text-xs"></i>
              </button>
            </div>
          
            <!-- TELEPHONE -->
            <div class="bg-gray-50 rounded-xl p-3 flex justify-between items-center">
              <div>
                <p class="text-gray-400">Téléphone</p>
                <p id="friend-phone"
                   class="font-medium text-gray-800"></p>
              </div>
              <button data-copy="friend-phone"
                      class="copy-btn text-gray-400 hover:text-[#1E2BE0] transition">
                <i class="bi bi-copy text-xs"></i>
              </button>
            </div>
          
          </div>


      <!-- ACTIONS -->
      <div class="w-full flex justify-between mt-6">

        <button id="write-friend"
                class="flex-1 mr-2 bg-[#1E2BE0] text-white py-2 rounded-xl text-xs font-medium flex items-center justify-center gap-2 active:scale-95 transition">
          <i class="bi bi-chat-dots text-xs"></i>
          Écrire
        </button>

        <button id="delete-friend"
                class="px-4 py-2 bg-red-50 text-red-500 rounded-xl text-xs flex items-center justify-center active:scale-95 transition">
          <i class="bi bi-person-x text-xs"></i>
        </button>

        <button id="close-friend-modal"
                class="ml-2 px-4 py-2 bg-gray-100 text-gray-500 rounded-xl text-xs flex items-center justify-center active:scale-95 transition">
          <i class="bi bi-x-lg text-xs"></i>
        </button>

      </div>

    </div>
  </div>
</div>

    <!-- AVATAR MODAL -->
    <div id="avatar-modal"
         class="fixed inset-0 bg-black/40 hidden 
                flex items-end justify-center z-50">

      <div class="bg-white w-full max-w-md 
                  rounded-t-3xl p-5 space-y-4 
                  max-h-[70vh] overflow-y-auto">

        <div class="flex justify-between items-center">
          <h3 class="font-semibold text-sm">
            Choisir un avatar
          </h3>
          <button id="close-avatar-modal"
                  class="text-gray-500">
            <i class="bi bi-x-lg"></i>
          </button>
        </div>

        <div id="avatar-options"
             class="grid grid-cols-3 gap-4"></div>

        <button id="save-avatar"
                class="w-full py-3 rounded-xl
                       bg-[#1E2BE0] text-white text-sm font-medium">
          Enregistrer
        </button>
      </div>
    </div>

  </main>

  <script type="module">
    import("/trustlink_app/main_js/profile.js");
  </script>

</body>
</html>
