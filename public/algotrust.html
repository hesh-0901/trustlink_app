<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>AlgoTrust Global Control Room</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#020617;
  font-family:system-ui;
  color:white;
}

/* HUD */
#hud{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:20px;
  display:flex;
  justify-content:space-between;
  z-index:20;
  pointer-events:none;
}

.glass{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
  pointer-events:auto;
}

/* Back Button */
.back-btn{
  position:fixed;
  bottom:25px;
  left:25px;
  padding:12px 20px;
  border-radius:30px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1);
  z-index:30;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="hud">

  <div class="glass p-4 rounded-xl text-sm">
    <div>Blockchain</div>
    <div id="blockHeight">Block: --</div>
    <div id="txCount">TX/s: --</div>
  </div>

  <div class="glass p-4 rounded-xl text-sm">
    <div>Smart Contracts</div>
    <div id="contracts">Active: --</div>
  </div>

</div>

<div class="back-btn" onclick="history.back()">
← Retour
</div>

<script>

/* ===============================
   THREE SCENE
================================ */

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);

const renderer = new THREE.WebGLRenderer({
  antialias:true,
  powerPreference:"high-performance"
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
document.body.appendChild(renderer.domElement);

camera.position.z = 3;

/* ===============================
   EARTH TEXTURE
================================ */

const loader = new THREE.TextureLoader();
const earthTexture = loader.load(
  "https://threejsfundamentals.org/threejs/resources/images/earth-day.jpg"
);

const earthMaterial = new THREE.MeshStandardMaterial({
  map:earthTexture
});

const globe = new THREE.Mesh(
  new THREE.SphereGeometry(1,64,64),
  earthMaterial
);

scene.add(globe);

/* Light (mode jour/nuit) */
const light = new THREE.DirectionalLight(0xffffff,1.2);
light.position.set(5,3,5);
scene.add(light);

/* ===============================
   GLOBAL NODES
================================ */

const nodeMaterial = new THREE.MeshBasicMaterial({color:0x60a5fa});
const nodeGeometry = new THREE.SphereGeometry(0.025,8,8);
let nodes = [];

for(let i=0;i<60;i++){
  const node = new THREE.Mesh(nodeGeometry,nodeMaterial);
  const phi = Math.acos((Math.random()*2)-1);
  const theta = Math.random()*Math.PI*2;

  node.position.set(
    Math.sin(phi)*Math.cos(theta),
    Math.sin(phi)*Math.sin(theta),
    Math.cos(phi)
  );

  scene.add(node);
  nodes.push(node);
}

/* ===============================
   CONNECTION LINES
================================ */

const lineMaterial = new THREE.LineBasicMaterial({
  color:0x3b82f6,
  transparent:true,
  opacity:0.4
});

for(let i=0;i<30;i++){
  const a = nodes[Math.floor(Math.random()*nodes.length)];
  const b = nodes[Math.floor(Math.random()*nodes.length)];

  const points = [];
  points.push(a.position);
  points.push(b.position);

  const geometry = new THREE.BufferGeometry().setFromPoints(points);
  const line = new THREE.Line(geometry,lineMaterial);
  scene.add(line);
}

/* ===============================
   TRANSACTION PARTICLES
================================ */

const txMaterial = new THREE.MeshBasicMaterial({color:0xffffff});
const txGeometry = new THREE.SphereGeometry(0.01,6,6);

function spawnTransaction(){

  const start = nodes[Math.floor(Math.random()*nodes.length)];
  const end = nodes[Math.floor(Math.random()*nodes.length)];

  const tx = new THREE.Mesh(txGeometry,txMaterial);
  tx.position.copy(start.position);
  scene.add(tx);

  let progress = 0;

  function animateTx(){
    progress += 0.01;
    tx.position.lerpVectors(start.position,end.position,progress);

    if(progress<1){
      requestAnimationFrame(animateTx);
    }else{
      scene.remove(tx);
    }
  }

  animateTx();
}

setInterval(spawnTransaction,800);

/* ===============================
   BLOCKCHAIN SIMULATION
================================ */

let blockHeight=12000;
let txRate=12;
let contractCount=45;

setInterval(()=>{
  blockHeight++;
  txRate=10+Math.floor(Math.random()*10);
  contractCount=40+Math.floor(Math.random()*20);

  document.getElementById("blockHeight")
    .textContent="Block: "+blockHeight;

  document.getElementById("txCount")
    .textContent="TX/s: "+txRate;

  document.getElementById("contracts")
    .textContent="Active: "+contractCount;

},2000);

/* ===============================
   GYROSCOPE EFFECT
================================ */

window.addEventListener("deviceorientation",(e)=>{
  if(e.beta && e.gamma){
    globe.rotation.x=e.beta*0.002;
    globe.rotation.y=e.gamma*0.002;
  }
});

/* ===============================
   SECRET ADMIN ACCESS
================================ */

let tapCount=0;
renderer.domElement.addEventListener("click",()=>{
  tapCount++;

  if(tapCount===5){
    const code=prompt("Admin Code:");
    if(code==="ALGO-ADMIN"){
      window.location.href="/trustlink_app/public/admin.html";
    }
  }

  if(tapCount===10){
    const code=prompt("SuperAdmin Key:");
    if(code==="ALGO-SUPER"){
      window.location.href="/trustlink_app/public/superadmin.html";
    }
  }

  setTimeout(()=>tapCount=0,4000);
});

/* ===============================
   ANIMATION LOOP
================================ */

function animate(){
  requestAnimationFrame(animate);
  globe.rotation.y += 0.0015;
  renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
