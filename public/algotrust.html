<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<title>AlgoTrust - TrustLink</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        neonBlue: "#3D4BFF",
        darkBg: "#0f172a",
        cardBg: "rgba(255,255,255,0.05)"
      }
    }
  }
}
</script>

<script type="module" src="/trustlink_app/js/firebase-init.js"></script>
<script type="module" src="/trustlink_app/js/algotrust.js"></script>

<style>
body {
  background: radial-gradient(circle at top, #1e293b, #0f172a);
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  color: white;
}

.glass {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
}

.neon-glow {
  box-shadow: 0 0 20px rgba(61,75,255,0.6);
}

.typing::after {
  content: "|";
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

.progress-ring {
  transition: stroke-dashoffset 1s ease-out;
  transform: rotate(-90deg);
  transform-origin: 50% 50%;
}
</style>

</head>

<body class="min-h-screen p-6">

<div class="max-w-md mx-auto space-y-6">

  <!-- HEADER -->
  <div>
    <h1 class="text-2xl font-bold tracking-wide">AlgoTrust</h1>
    <p class="text-sm text-gray-400">Analyse intelligente de votre profil</p>
  </div>

  <!-- TRUST SCORE -->
  <div class="glass rounded-3xl p-6 neon-glow">

    <div class="flex justify-center">
      <svg width="160" height="160">
        <circle cx="80" cy="80" r="70"
          stroke="#1e293b"
          stroke-width="12"
          fill="transparent"/>
        <circle id="scoreRing"
          cx="80" cy="80" r="70"
          stroke="#3D4BFF"
          stroke-width="12"
          fill="transparent"
          stroke-dasharray="440"
          stroke-dashoffset="440"
          class="progress-ring"/>
      </svg>
    </div>

    <div class="text-center mt-4">
      <div id="trustScore"
           class="text-4xl font-bold">
        0
      </div>
      <div id="trustLevel"
           class="text-sm text-gray-400 mt-1">
        Calcul en cours...
      </div>
    </div>

  </div>

  <!-- IA ANALYSIS -->
  <div class="glass rounded-3xl p-5">
    <div class="text-sm text-gray-400 mb-2">
      Analyse comportementale
    </div>
    <div id="aiText"
         class="text-sm typing">
      Initialisation...
    </div>
  </div>

  <!-- STATS -->
  <div class="glass rounded-3xl p-5 space-y-3">

    <div class="flex justify-between text-sm">
      <span>Volume total</span>
      <span id="totalVolume">0</span>
    </div>

    <div class="flex justify-between text-sm">
      <span>Transactions</span>
      <span id="totalTx">0</span>
    </div>

    <div class="flex justify-between text-sm">
      <span>Taux de réussite</span>
      <span id="successRate">0%</span>
    </div>

  </div>

  <!-- ADMIN SECRET -->
  <div id="adminSection"
       class="glass rounded-3xl p-5 hidden border border-red-500">

    <div class="text-red-400 text-sm font-semibold mb-2">
      ADMIN INTELLIGENCE PANEL
    </div>

    <div class="text-sm space-y-2">
      <div>Risk Flag : <span id="riskFlag"></span></div>
      <div>Suspicious Score : <span id="suspiciousScore"></span></div>
      <div>Multi Account Detection : <span id="multiDetect"></span></div>
    </div>

  </div>

</div>

</body>
</html>
