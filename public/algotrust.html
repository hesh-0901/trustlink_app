<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<title>AlgoTrust Intelligence</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: radial-gradient(circle at top, #0c1335, #070c24);
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  color: white;
}

/* Hero container */
.hero-card {
  background: linear-gradient(145deg, #141b4d, #0e1438);
  border-radius: 30px;
  padding: 20px;
  border: 1px solid rgba(124,58,237,0.4);
  box-shadow: 0 0 40px rgba(124,58,237,0.4);
}

/* Glow border */
.glow-border {
  border-radius: 28px;
  padding: 2px;
  background: linear-gradient(45deg,#7C3AED,#3D4BFF);
}

/* Avatar glow */
.avatar-wrapper {
  border-radius: 50%;
  padding: 3px;
  background: linear-gradient(45deg,#7C3AED,#3D4BFF);
  box-shadow: 0 0 20px rgba(124,58,237,0.8);
}

.avatar-wrapper img {
  border-radius: 50%;
  width: 70px;
  height: 70px;
  object-fit: cover;
}

/* Floating icons */
.floating-icon {
  position: absolute;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(8px);
  border-radius: 50%;
  padding: 12px;
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 0 20px rgba(124,58,237,0.6);
}

/* Robot glow */
.robot-glow {
  filter: drop-shadow(0 0 30px #7C3AED);
}

/* Stats card */
.stat-card {
  background: linear-gradient(145deg,#131a48,#0c1233);
  border-radius: 24px;
  padding: 20px;
  border: 1px solid rgba(255,255,255,0.1);
}

/* Trend card */
.trend-card {
  background: linear-gradient(145deg,#131a48,#0c1233);
  border-radius: 30px;
  padding: 25px;
  border: 1px solid rgba(255,255,255,0.08);
}
</style>

</head>

<body class="min-h-screen p-6">

<div class="max-w-md mx-auto space-y-8">

  <!-- HEADER -->
  <div class="flex justify-between items-start">
    <div>
      <div class="text-indigo-400 text-sm tracking-wide">
        DATA VISUALIZATION
      </div>
      <h1 class="text-2xl font-bold mt-1">
        AlgoTrust Intelligence
      </h1>
    </div>

    <div class="avatar-wrapper">
      <img src="/trustlink_app/assets/avatars/default.png" />
    </div>
  </div>

  <!-- HERO SECTION -->
  <div class="glow-border">
    <div class="hero-card relative overflow-hidden">

      <!-- Floating Icons -->
      <div class="floating-icon top-6 left-6">
        📊
      </div>

      <div class="floating-icon top-6 right-6">
        🔐
      </div>

      <div class="floating-icon bottom-20 left-6">
        ☁️
      </div>

      <div class="floating-icon bottom-20 right-6">
        💬
      </div>

      <!-- Robot -->
      <div class="flex justify-center mt-6">
        <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png"
             class="w-36 robot-glow">
      </div>

      <!-- Logo -->
      <div class="flex justify-center mt-6">
        <img src="/trustlink_app/assets/algotrust-logo.svg"
             class="w-16 drop-shadow-[0_0_25px_#7C3AED]">
      </div>

    </div>
  </div>

  <!-- STATS -->
  <div class="grid grid-cols-2 gap-5">

    <div class="stat-card text-center">
      <div class="text-gray-400 text-sm">
        Volume
      </div>
      <div class="text-2xl font-bold mt-2">
        29365.00
      </div>
    </div>

    <div class="stat-card text-center">
      <div class="text-gray-400 text-sm">
        Transactions
      </div>
      <div class="text-2xl font-bold mt-2">
        7
      </div>
    </div>

  </div>

  <!-- TREND -->
  <div class="trend-card">
    <div class="text-gray-400 mb-6">
      Trend Analysis (30 jours)
    </div>

    <div class="h-24 relative">

      <!-- Fake graph line -->
      <svg viewBox="0 0 300 100" class="w-full h-full">
        <path d="M0 80 Q40 75 60 78 T120 72 T180 65 T240 55 T300 50"
              stroke="#7C3AED"
              stroke-width="3"
              fill="none"/>
      </svg>

    </div>
  </div>

</div>

</body>
</html>
