<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>AlgoTrust Neural Observatory</title>

<script src="https://cdn.tailwindcss.com"></script>
<script type="module" src="/trustlink_app/js/firebase-init.js"></script>

<style>
body{
  margin:0;
  background:
    radial-gradient(circle at 50% 40%, #0b1120 0%, #03040a 60%, #000 100%);
  color:white;
  overflow:hidden;
  font-family:system-ui;
}

/* Cinematic light aura */
.aura{
  position:absolute;
  width:420px;
  height:420px;
  border-radius:50%;
  background: radial-gradient(circle,
    rgba(59,130,246,0.25) 0%,
    rgba(59,130,246,0.08) 40%,
    transparent 70%);
  filter:blur(40px);
  animation: breathe 6s ease-in-out infinite;
}

/* Core */
.core{
  width:260px;
  height:260px;
  border-radius:50%;
  background:
    radial-gradient(circle at 30% 30%, #1e3a8a 0%, #0f172a 60%);
  box-shadow:
    0 0 150px rgba(59,130,246,0.35),
    inset 0 0 80px rgba(59,130,246,0.25);
  position:relative;
  backdrop-filter:blur(20px);
  animation: pulse 4s ease-in-out infinite;
}

/* Glass subtle ring */
.ring{
  position:absolute;
  inset:-30px;
  border-radius:50%;
  border:1px solid rgba(96,165,250,0.15);
  animation: rotate 60s linear infinite;
}

.ring:nth-child(2){
  inset:-60px;
  animation-duration:90s;
  opacity:.4;
}

@keyframes rotate{
  from{ transform:rotate(0deg); }
  to{ transform:rotate(360deg); }
}

/* Soft breathing */
@keyframes breathe{
  0%{ transform:scale(1); opacity:.7 }
  50%{ transform:scale(1.05); opacity:1 }
  100%{ transform:scale(1); opacity:.7 }
}

/* Core pulse */
@keyframes pulse{
  0%{ box-shadow:
      0 0 100px rgba(59,130,246,0.3),
      inset 0 0 60px rgba(59,130,246,0.2); }
  50%{ box-shadow:
      0 0 180px rgba(59,130,246,0.6),
      inset 0 0 90px rgba(59,130,246,0.35); }
  100%{ box-shadow:
      0 0 100px rgba(59,130,246,0.3),
      inset 0 0 60px rgba(59,130,246,0.2); }
}

/* Floating particles */
.particles{
  position:absolute;
  width:100%;
  height:100%;
  pointer-events:none;
}

.particle{
  position:absolute;
  width:2px;
  height:2px;
  background:#60a5fa;
  border-radius:50%;
  opacity:.5;
  animation: float 10s linear infinite;
}

@keyframes float{
  from{ transform:translateY(0px); opacity:.2 }
  to{ transform:translateY(-200px); opacity:.8 }
}

/* Streaming text */
.stream{
  font-size:11px;
  letter-spacing:1px;
  color:#93c5fd;
  opacity:.6;
  transition:.4s;
}
</style>
</head>

<body>

<div class="flex flex-col items-center justify-center min-h-screen relative">

  <div class="relative flex items-center justify-center">

    <div class="aura"></div>

    <div class="ring"></div>
    <div class="ring"></div>

    <div class="core flex items-center justify-center">
      <div id="analysisText"
        class="text-sm tracking-widest text-blue-300 transition-all duration-500">
        INITIALIZING
      </div>
    </div>

  </div>

  <!-- Live streaming data -->
  <div class="mt-16 space-y-2 text-center">
    <div class="stream" id="stream1"></div>
    <div class="stream" id="stream2"></div>
    <div class="stream" id="stream3"></div>
  </div>

  <div class="particles" id="particles"></div>

</div>

<script type="module">

import { initNeuralFX } from "/trustlink_app/main_js/neural-ui.js";
initNeuralFX();

/* PARTICLES */
const container=document.getElementById("particles");

for(let i=0;i<40;i++){
  const p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"%";
  p.style.top=Math.random()*100+"%";
  p.style.animationDuration=(6+Math.random()*8)+"s";
  container.appendChild(p);
}

/* Live streaming simulation */
function randomData(){
  return "TX-"+Math.floor(Math.random()*99999)
    +" | VALIDATED | NODE-"+Math.floor(Math.random()*100);
}

setInterval(()=>{
  document.getElementById("stream1").textContent=randomData();
  document.getElementById("stream2").textContent=randomData();
  document.getElementById("stream3").textContent=randomData();
},1500);

/* Analyse dynamique */

const states=[
  "SCANNING NETWORK",
  "VERIFYING CONSENSUS",
  "CALCULATING RISK",
  "SYNCHRONIZING LEDGER",
  "TRUST SCORE STABLE"
];

let i=0;
setInterval(()=>{
  const el=document.getElementById("analysisText");
  el.style.opacity=0;
  setTimeout(()=>{
    el.textContent=states[i];
    el.style.opacity=1;
    i=(i+1)%states.length;
  },300);
},2500);

</script>

</body>
</html>
