<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<title>AlgoTrust Intelligence</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: radial-gradient(circle at top, #0c1335, #070c24 60%);
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  color: white;
}

/* ===== GLASS EFFECT ===== */
.glass {
  background: rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 8px 32px rgba(124, 58, 237, 0.2);
}

/* ===== HERO CARD ===== */
.hero-wrapper {
  padding: 2px;
  border-radius: 32px;
  background: linear-gradient(45deg,#7C3AED,#3D4BFF);
}

.hero-card {
  border-radius: 30px;
  padding: 30px 25px 60px 25px;
  position: relative;
  overflow: hidden;
}

/* ===== AVATAR ===== */
.avatar-wrapper {
  border-radius: 50%;
  padding: 3px;
  background: linear-gradient(45deg,#7C3AED,#3D4BFF);
  box-shadow: 0 0 25px rgba(124,58,237,0.9);
}

.avatar-wrapper img {
  border-radius: 50%;
  width: 70px;
  height: 70px;
  object-fit: cover;
}

/* ===== FLOATING ICONS ===== */
.floating-icon {
  position: absolute;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border-radius: 50%;
  padding: 12px;
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 0 20px rgba(124,58,237,0.6);
}

/* ===== LOGO ANIMATION ===== */
.logo-animate {
  animation: pulseGlow 3s infinite ease-in-out;
}

@keyframes pulseGlow {
  0% { transform: scale(1); filter: drop-shadow(0 0 15px #7C3AED); }
  50% { transform: scale(1.05); filter: drop-shadow(0 0 40px #3D4BFF); }
  100% { transform: scale(1); filter: drop-shadow(0 0 15px #7C3AED); }
}

/* ===== STAT CARDS ===== */
.stat-card {
  border-radius: 24px;
  padding: 22px;
}

/* ===== TREND CARD ===== */
.trend-card {
  border-radius: 30px;
  padding: 28px;
}
</style>

</head>

<body class="min-h-screen p-6">

<div class="max-w-md mx-auto space-y-8">

  <!-- HEADER -->
  <div class="flex justify-between items-start">
    <div>
      <div class="text-indigo-400 text-sm tracking-wide">
        DATA VISUALIZATION
      </div>
      <h1 class="text-2xl font-bold mt-1">
        AlgoTrust Intelligence
      </h1>
    </div>

    <div class="avatar-wrapper">
      <img src="/trustlink_app/assets/avatars/default.png">
    </div>
  </div>

  <!-- HERO -->
  <div class="hero-wrapper">
    <div class="hero-card glass">

      <!-- Floating Icons -->
      
      <!-- IMAGE CENTER -->
      <div class="flex justify-center mt-10 relative">

        <!-- Halo glow -->
        <div class="absolute w-40 h-40 bg-purple-600/30 blur-3xl rounded-full">
        </div>

        <img src="/trustlink_app/assets/algotrust-logo.jpeg"
             class="w-28 relative z-10 logo-animate">

      </div>

    </div>
  </div>

  <!-- STATS -->
  <div class="grid grid-cols-2 gap-5">

    <div class="stat-card glass text-center">
      <div class="text-gray-400 text-sm">
        Volume
      </div>
      <div class="text-2xl font-bold mt-2">
        29365.00
      </div>
    </div>

    <div class="stat-card glass text-center">
      <div class="text-gray-400 text-sm">
        Transactions
      </div>
      <div class="text-2xl font-bold mt-2">
        7
      </div>
    </div>

  </div>

  <!-- TREND -->
  <div class="trend-card glass">
    <div class="text-gray-400 mb-6">
      Trend Analysis (30 jours)
    </div>

    <div class="h-24 relative">

      <svg viewBox="0 0 300 100" class="w-full h-full">
        <path d="M0 80 Q40 75 60 78 T120 72 T180 65 T240 55 T300 50"
              stroke="#7C3AED"
              stroke-width="3"
              fill="none"/>
      </svg>

    </div>
  </div>

</div>

</body>
</html>
