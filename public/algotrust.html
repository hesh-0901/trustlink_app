<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>AI Cinematic Robot</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
canvas { display:block; }
</style>
</head>
<body>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
import { EffectComposer } from "https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js";
import { RenderPass } from "https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/RenderPass.js";
import { UnrealBloomPass } from "https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000010);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,1.5,5);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
document.body.appendChild(renderer.domElement);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloom = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight),
  1.5, 0.4, 0.85
);
composer.addPass(bloom);

// Lumière volumétrique style néon
const light = new THREE.PointLight(0x00ffff, 5, 20);
light.position.set(0,3,3);
scene.add(light);

// Robot (placeholder sphère stylisée)
const geometry = new THREE.SphereGeometry(1, 128, 128);

const material = new THREE.ShaderMaterial({
  uniforms: {
    time: { value: 0 }
  },
  vertexShader: `
    varying vec3 vNormal;
    void main() {
      vNormal = normal;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
    }
  `,
  fragmentShader: `
    uniform float time;
    varying vec3 vNormal;
    void main() {
      float intensity = pow(0.7 - dot(vNormal, vec3(0.0,0.0,1.0)), 2.0);
      vec3 glow = vec3(0.0, 0.8, 1.0) * intensity;
      gl_FragColor = vec4(glow, 1.0);
    }
  `,
  blending: THREE.AdditiveBlending,
  transparent: true
});

const robot = new THREE.Mesh(geometry, material);
scene.add(robot);

// Anneaux énergétiques
const ringGeo = new THREE.TorusGeometry(1.5, 0.05, 32, 200);
const ringMat = new THREE.MeshBasicMaterial({ color:0x00ffff });

const ring1 = new THREE.Mesh(ringGeo, ringMat);
ring1.rotation.x = Math.PI / 2;
scene.add(ring1);

const ring2 = new THREE.Mesh(ringGeo, ringMat);
ring2.position.y = -0.5;
ring2.rotation.x = Math.PI / 2;
scene.add(ring2);

// Caméra controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Animation loop
function animate(t) {
  requestAnimationFrame(animate);

  material.uniforms.time.value = t * 0.001;

  ring1.rotation.z += 0.01;
  ring2.rotation.z -= 0.008;

  robot.rotation.y += 0.005;

  controls.update();
  composer.render();
}

animate();

window.addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
