<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlgoTrust - TrustLink</title>

<script src="https://cdn.tailwindcss.com"></script>
<script type="module" src="/trustlink_app/js/firebase-init.js"></script>

<style>
body {
  margin:0;
  background:#020617;
  overflow:hidden;
  color:white;
  font-family: system-ui;
}

/* Canvas Fullscreen */
canvas {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

/* Glass HUD */
.glass {
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(25px);
  border:1px solid rgba(255,255,255,0.1);
}

/* Floating animation */
@keyframes float {
  0%{ transform:translateY(0px); }
  50%{ transform:translateY(-10px); }
  100%{ transform:translateY(0px); }
}

.float {
  animation: float 4s ease-in-out infinite;
}

/* Glow */
@keyframes glowPulse {
  0%{ box-shadow:0 0 10px #3b82f6; }
  50%{ box-shadow:0 0 30px #3b82f6; }
  100%{ box-shadow:0 0 10px #3b82f6; }
}

.glow {
  animation: glowPulse 3s infinite;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="relative z-10 flex flex-col items-center justify-center min-h-screen px-6 text-center space-y-8">

  <!-- GLOBE -->
  <div class="relative w-56 h-56 float">

    <div class="absolute inset-0 rounded-full border border-blue-500 opacity-40 animate-spin"
         style="animation-duration:30s;"></div>

    <div class="absolute inset-4 rounded-full border border-blue-400 opacity-30 animate-spin"
         style="animation-direction:reverse;animation-duration:20s;"></div>

    <div class="w-full h-full rounded-full bg-gradient-to-br from-blue-500 via-indigo-600 to-blue-900 glow flex items-center justify-center text-5xl">
      🌍
    </div>

  </div>

  <!-- USER BADGE -->
  <div class="glass rounded-2xl px-6 py-4 space-y-2 w-full max-w-sm">

    <div class="flex items-center justify-center gap-3">
      <div class="w-12 h-12 rounded-full bg-blue-600 flex items-center justify-center text-lg">
        👤
      </div>
      <div class="text-left">
        <p id="username" class="font-semibold">Chargement...</p>
        <p class="text-xs text-blue-300">Trust Member</p>
      </div>
    </div>

    <div class="pt-3 space-y-1 text-sm">
      <div class="flex justify-between">
        <span>TrustScore</span>
        <span id="score">--</span>
      </div>
      <div class="flex justify-between">
        <span>Niveau</span>
        <span id="level">--</span>
      </div>
    </div>

  </div>

</div>

<script type="module">

import { db } from "/trustlink_app/js/firebase-init.js";
import {
  doc,
  getDoc,
  collection,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* ===============================
   USER DATA + SCORE
================================ */

const userId =
  localStorage.getItem("userId") ||
  sessionStorage.getItem("userId");

if (!userId)
  window.location.href="/trustlink_app/index.html";

async function loadUser() {

  const userSnap = await getDoc(doc(db,"users",userId));
  const txQuery = query(
    collection(db,"transactions"),
    where("participants","array-contains",userId)
  );

  const txSnap = await getDocs(txQuery);

  let completed=0, rejected=0;

  txSnap.forEach(doc=>{
    const tx=doc.data();
    if(tx.status==="completed") completed++;
    if(tx.status==="rejected") rejected++;
  });

  let score = 60 + completed*3 - rejected*4;
  score=Math.max(0,Math.min(100,score));

  document.getElementById("username").textContent =
    userSnap.exists()? userSnap.data().firstName : "Utilisateur";

  document.getElementById("score").textContent=score;

  if(score>85)
    document.getElementById("level").textContent="Elite";
  else if(score>65)
    document.getElementById("level").textContent="Fiable";
  else
    document.getElementById("level").textContent="Standard";
}

loadUser();

/* ===============================
   PARTICLE NETWORK
================================ */

const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<80;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5)*0.7,
    vy:(Math.random()-0.5)*0.7
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;

    if(p.x<0||p.x>canvas.width) p.vx*=-1;
    if(p.y<0||p.y>canvas.height) p.vy*=-1;

    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fillStyle="#3b82f6";
    ctx.fill();

    particles.forEach(o=>{
      const dx=p.x-o.x;
      const dy=p.y-o.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<120){
        ctx.beginPath();
        ctx.moveTo(p.x,p.y);
        ctx.lineTo(o.x,o.y);
        ctx.strokeStyle="rgba(59,130,246,0.08)";
        ctx.stroke();
      }
    });
  });

  requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
