<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlgoTrust - TrustLink</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

/* === BACKGROUND FUTURISTE === */
body {
  background: radial-gradient(circle at 20% 20%, #0f172a, #020617 70%);
  overflow-x: hidden;
}

/* Glow effect */
.glow-card {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 0 30px rgba(59,130,246,0.15);
}

/* Pulse animation */
@keyframes pulseGlow {
  0% { box-shadow: 0 0 10px rgba(59,130,246,0.3); }
  50% { box-shadow: 0 0 25px rgba(59,130,246,0.6); }
  100% { box-shadow: 0 0 10px rgba(59,130,246,0.3); }
}

.pulse-glow {
  animation: pulseGlow 2.5s infinite;
}

/* Blockchain blocks animation */
@keyframes slideBlock {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.block {
  animation: slideBlock 1s ease forwards;
}

</style>

</head>

<body class="text-white min-h-screen flex flex-col">

<div class="pt-10 px-6 max-w-md mx-auto w-full space-y-8">

<!-- HEADER -->
<div class="text-center space-y-2">
  <div class="w-16 h-16 mx-auto rounded-2xl bg-gradient-to-br from-indigo-500 to-blue-600 flex items-center justify-center pulse-glow">
    <i class="bi bi-robot text-2xl"></i>
  </div>
  <h1 class="text-2xl font-bold tracking-tight">
    AlgoTrust
  </h1>
  <p class="text-sm text-blue-200">
    Intelligence Financière Décentralisée
  </p>
</div>

<!-- TRUST SCORE -->
<div class="glow-card rounded-2xl p-6 text-center space-y-4">

  <p class="text-sm text-blue-300 uppercase tracking-widest">
    TrustScore
  </p>

  <div class="relative w-40 h-40 mx-auto">

    <svg class="absolute inset-0" viewBox="0 0 120 120">
      <circle cx="60" cy="60" r="54"
              stroke="#1e293b"
              stroke-width="12"
              fill="none"/>
      <circle id="scoreCircle"
              cx="60" cy="60" r="54"
              stroke="url(#grad)"
              stroke-width="12"
              fill="none"
              stroke-dasharray="339"
              stroke-dashoffset="120"
              stroke-linecap="round"
              transform="rotate(-90 60 60)"/>
      <defs>
        <linearGradient id="grad">
          <stop offset="0%" stop-color="#3b82f6"/>
          <stop offset="100%" stop-color="#6366f1"/>
        </linearGradient>
      </defs>
    </svg>

    <div class="absolute inset-0 flex items-center justify-center">
      <span id="scoreValue" class="text-3xl font-bold">84</span>
    </div>

  </div>

  <p class="text-sm text-blue-300">
    Niveau : Utilisateur fiable
  </p>

</div>

<!-- ANALYSE -->
<div class="glow-card rounded-2xl p-5 space-y-4">

  <h2 class="text-sm font-semibold text-blue-300 uppercase">
    Analyse Comportementale
  </h2>

  <div class="space-y-2 text-sm text-blue-100">
    <div class="flex justify-between">
      <span>Remboursements à temps</span>
      <span class="text-green-400">92%</span>
    </div>
    <div class="flex justify-between">
      <span>Activité mensuelle</span>
      <span>Stable</span>
    </div>
    <div class="flex justify-between">
      <span>Risque estimé</span>
      <span class="text-green-400">Faible</span>
    </div>
  </div>

</div>

<!-- SIMULATION BLOCKCHAIN -->
<div class="glow-card rounded-2xl p-5 space-y-4">

  <h2 class="text-sm font-semibold text-blue-300 uppercase">
    Simulation Blockchain
  </h2>

  <div id="blockchain" class="space-y-2 text-xs text-blue-200">
    <div class="block bg-blue-900/40 p-3 rounded-lg">
      Bloc #45821 | Validé ✔
    </div>
    <div class="block bg-blue-900/40 p-3 rounded-lg">
      Bloc #45822 | Validé ✔
    </div>
  </div>

</div>

</div>

<script>

/* === SCORE ANIMATION === */
let score = 0;
const target = 84;
const scoreText = document.getElementById("scoreValue");

const interval = setInterval(() => {
  if (score >= target) {
    clearInterval(interval);
  } else {
    score++;
    scoreText.textContent = score;
  }
}, 20);

/* === FAKE BLOCKCHAIN FLOW === */
const blockchain = document.getElementById("blockchain");

setInterval(() => {
  const newBlock = document.createElement("div");
  newBlock.className =
    "block bg-blue-900/40 p-3 rounded-lg";
  newBlock.innerText =
    "Bloc #" + Math.floor(Math.random()*99999) + " | Validé ✔";

  blockchain.prepend(newBlock);

  if (blockchain.children.length > 4) {
    blockchain.removeChild(blockchain.lastChild);
  }

}, 4000);

</script>

</body>
</html>
