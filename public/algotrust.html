<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<title>AlgoTrust - IA Visualization</title>

<script src="https://cdn.tailwindcss.com"></script>
<script type="module" src="/trustlink_app/js/firebase-init.js"></script>
<script type="module" src="/trustlink_app/js/algotrust.js"></script>

<style>
body {
  background: radial-gradient(circle at top, #0a0f2c, #050b1e);
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* Glass card */
.glass {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 24px;
  padding: 18px;
}

/* Neon glow */
.neon {
  box-shadow: 0 0 25px rgba(61,75,255,0.6);
}

/* Brain animation */
.brain {
  animation: pulse 3s infinite ease-in-out;
}

@keyframes pulse {
  0% { transform: scale(1); filter: drop-shadow(0 0 10px #3D4BFF); }
  50% { transform: scale(1.05); filter: drop-shadow(0 0 30px #7C3AED); }
  100% { transform: scale(1); filter: drop-shadow(0 0 10px #3D4BFF); }
}

/* Profile photo glow */
.profile-frame {
  border-radius: 50%;
  padding: 4px;
  background: linear-gradient(45deg,#3D4BFF,#7C3AED);
  box-shadow: 0 0 20px rgba(124,58,237,0.8);
}

.profile-frame img {
  border-radius: 50%;
  width: 80px;
  height: 80px;
  object-fit: cover;
}
</style>

</head>

<body class="min-h-screen p-6">

<div class="max-w-md mx-auto space-y-6">

  <!-- HEADER -->
  <div class="flex justify-between items-center">
    <div>
      <div class="text-xs text-indigo-400">DATA VISUALIZATION</div>
      <div class="text-lg font-bold">AlgoTrust Intelligence</div>
    </div>

    <!-- PHOTO -->
    <div class="profile-frame">
      <img id="profilePhoto" src="/trustlink_app/assets/avatars/default.png">
    </div>
  </div>

  <!-- IA CENTER -->
  <div class="glass neon text-center">

    <div class="flex justify-center mb-4">
      <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png"
           class="brain w-28 opacity-90">
    </div>

    <div id="trustScore"
         class="text-4xl font-bold">
      0
    </div>

    <div id="trustLevel"
         class="text-sm text-indigo-300 mt-1">
      Initialisation IA...
    </div>

  </div>

  <!-- MINI STATS -->
  <div class="grid grid-cols-2 gap-4">

    <div class="glass text-center">
      <div class="text-xs text-gray-400">Volume</div>
      <div id="totalVolume"
           class="text-lg font-bold">
        0
      </div>
    </div>

    <div class="glass text-center">
      <div class="text-xs text-gray-400">Transactions</div>
      <div id="totalTx"
           class="text-lg font-bold">
        0
      </div>
    </div>

  </div>

  <!-- GRAPH -->
  <div class="glass">
    <div class="text-xs text-gray-400 mb-2">
      Trend Analysis (30 jours)
    </div>
    <canvas id="predictionChart"
            height="120">
    </canvas>
  </div>

  <!-- BADGES -->
  <div class="glass">
    <div class="text-xs text-gray-400 mb-2">
      AI Recognition
    </div>
    <div id="badgesContainer"
         class="flex flex-wrap gap-2">
    </div>
  </div>

  <!-- ADMIN SECRET -->
  <div id="adminSection"
       class="glass hidden border border-red-500">
    <div class="text-red-400 text-sm font-semibold">
      ADMIN SECRET LAYER
    </div>
    <div id="adminData"
         class="text-xs mt-2">
    </div>
  </div>

</div>

</body>
</html>
