<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlgoTrust - TrustLink</title>

<script src="https://cdn.tailwindcss.com"></script>
<script type="module" src="/trustlink_app/js/firebase-init.js"></script>

<style>

body{
  margin:0;
  background: radial-gradient(circle at center, #0b1220 0%, #05070f 70%);
  color:white;
  font-family: system-ui, -apple-system;
  overflow:hidden;
}

/* ===== CORE ===== */

.core-wrapper{
  position:relative;
  width:260px;
  height:260px;
}

.core{
  width:100%;
  height:100%;
  border-radius:50%;
  background: radial-gradient(circle at 30% 30%, #1e3a8a, #0f172a 70%);
  box-shadow:
    0 0 60px rgba(37,99,235,0.4),
    inset 0 0 40px rgba(59,130,246,0.3);
  position:relative;
}

/* Energy pulse */
@keyframes pulse {
  0%{ transform:scale(1); }
  50%{ transform:scale(1.05); }
  100%{ transform:scale(1); }
}

.core::after{
  content:"";
  position:absolute;
  inset:25%;
  border-radius:50%;
  background: radial-gradient(circle, #3b82f6, transparent 70%);
  animation:pulse 4s ease-in-out infinite;
}

/* Orbit rings */

.ring{
  position:absolute;
  inset:-25px;
  border-radius:50%;
  border:1px solid rgba(59,130,246,0.2);
  animation:spin 20s linear infinite;
}

.ring:nth-child(2){
  inset:-45px;
  animation-duration:35s;
  opacity:.5;
}

@keyframes spin{
  from{ transform:rotate(0deg); }
  to{ transform:rotate(360deg); }
}

/* ===== GLASS ===== */

.glass{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border:1px solid rgba(255,255,255,0.08);
}

/* Fade up */
@keyframes fadeUp{
  from{ opacity:0; transform:translateY(20px); }
  to{ opacity:1; transform:translateY(0); }
}

.fade-up{
  animation:fadeUp .8s ease forwards;
}

/* Back button */
.back-btn{
  position:fixed;
  top:20px;
  left:20px;
  padding:10px 18px;
  border-radius:30px;
  font-size:14px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.1);
  transition:all .3s ease;
}

.back-btn:hover{
  background: rgba(255,255,255,0.15);
}

</style>
</head>

<body>

<button onclick="history.back()" class="back-btn">
← Retour
</button>

<div class="flex flex-col items-center justify-center min-h-screen px-6 text-center space-y-10">

  <!-- CORE -->
  <div class="core-wrapper fade-up">

    <div class="ring"></div>
    <div class="ring"></div>

    <div class="core flex items-center justify-center">
      <div class="text-sm tracking-widest text-blue-300">
        ALGO CORE
      </div>
    </div>

  </div>

  <!-- USER HUD -->
  <div class="glass rounded-2xl p-6 w-full max-w-sm space-y-4 fade-up">

    <div>
      <p id="username" class="text-lg font-semibold">Chargement...</p>
      <p class="text-xs text-blue-300 tracking-wide">
        Financial Identity Verified
      </p>
    </div>

    <div class="pt-2 space-y-2 text-sm">

      <div class="flex justify-between">
        <span>TrustScore</span>
        <span id="score" class="font-semibold">--</span>
      </div>

      <div class="flex justify-between">
        <span>Risk Index</span>
        <span id="risk" class="text-blue-300">--</span>
      </div>

      <div class="flex justify-between">
        <span>Status</span>
        <span id="status">--</span>
      </div>

    </div>

  </div>

</div>

<script type="module">

import { db } from "/trustlink_app/js/firebase-init.js";
import {
  doc,
  getDoc,
  collection,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const userId =
  localStorage.getItem("userId") ||
  sessionStorage.getItem("userId");

if(!userId)
  window.location.href="/trustlink_app/index.html";

async function loadData(){

  const userSnap = await getDoc(doc(db,"users",userId));
  const txQuery = query(
    collection(db,"transactions"),
    where("participants","array-contains",userId)
  );

  const txSnap = await getDocs(txQuery);

  let completed=0, rejected=0;

  txSnap.forEach(doc=>{
    const tx=doc.data();
    if(tx.status==="completed") completed++;
    if(tx.status==="rejected") rejected++;
  });

  let score = 70 + completed*2 - rejected*3;
  score = Math.max(0,Math.min(100,score));

  document.getElementById("username").textContent =
    userSnap.exists()? userSnap.data().firstName+" "+userSnap.data().lastName : "Utilisateur";

  document.getElementById("score").textContent=score;

  document.getElementById("risk").textContent =
    score>80 ? "Low"
    : score>60 ? "Moderate"
    : "Elevated";

  document.getElementById("status").textContent =
    score>85 ? "Institutional Grade"
    : score>65 ? "Verified"
    : "Standard";

}

loadData();

</script>

</body>
</html>
