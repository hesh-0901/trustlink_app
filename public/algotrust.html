<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>AlgoTrust Neural Observatory</title>

<script src="https://cdn.tailwindcss.com"></script>
<script type="module" src="/trustlink_app/js/firebase-init.js"></script>

<style>
body{
  margin:0;
  background:#04060d;
  color:white;
  overflow:hidden;
  font-family:system-ui;
}

/* Volumetric hologram */
.core{
  width:260px;
  height:260px;
  border-radius:50%;
  background: radial-gradient(circle, #1e3a8a 20%, #0f172a 70%);
  box-shadow:
    0 0 120px rgba(59,130,246,0.5),
    inset 0 0 60px rgba(59,130,246,0.4);
  position:relative;
}

/* Hologram layers */
.layer{
  position:absolute;
  inset:0;
  border-radius:50%;
  border:1px solid rgba(59,130,246,0.2);
  animation:spin 30s linear infinite;
}

@keyframes spin{
  from{ transform:rotateX(0deg) rotateY(0deg); }
  to{ transform:rotateX(360deg) rotateY(360deg); }
}

/* Streaming text */
.stream{
  font-size:10px;
  color:#60a5fa;
  opacity:.7;
  animation:fade 2s infinite alternate;
}

@keyframes fade{
  from{ opacity:.2 }
  to{ opacity:.8 }
}
</style>
</head>

<body>

<div class="flex flex-col items-center justify-center min-h-screen space-y-10">

  <div class="relative">

    <div class="layer"></div>
    <div class="layer" style="animation-duration:50s"></div>

    <div class="core flex items-center justify-center">
      <div id="analysisText" class="text-xs tracking-widest text-blue-300">
        ANALYSING...
      </div>
    </div>

  </div>

  <!-- Live streaming data -->
  <div class="space-y-1 text-center">
    <div class="stream" id="stream1"></div>
    <div class="stream" id="stream2"></div>
    <div class="stream" id="stream3"></div>
  </div>

</div>

<script type="module">

import { initNeuralFX } from "/trustlink_app/main_js/neural-ui.js";
initNeuralFX();

/* Live streaming simulation */

function randomData(){
  return "TX-"+Math.floor(Math.random()*99999)+" | CONFIRMED | NODE-"+Math.floor(Math.random()*100);
}

setInterval(()=>{
  document.getElementById("stream1").textContent=randomData();
  document.getElementById("stream2").textContent=randomData();
  document.getElementById("stream3").textContent=randomData();
},1500);

/* Analyse dynamique */

const states=["SCANNING","VERIFYING","CALCULATING RISK","SYNCING LEDGER","VALIDATING TRUST"];

let i=0;
setInterval(()=>{
  document.getElementById("analysisText").textContent=states[i];
  i=(i+1)%states.length;
},2000);

</script>

</body>
</html>
