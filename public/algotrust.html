<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<title>AlgoTrust - TrustLink</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        neonBlue: "#3D4BFF",
        neonPurple: "#7C3AED"
      }
    }
  }
}
</script>

<script type="module" src="/trustlink_app/js/firebase-init.js"></script>
<script type="module" src="/trustlink_app/js/algotrust.js"></script>

<style>
:root {
  --bg-dark: #0f172a;
  --bg-light: #f1f5f9;
  --card-dark: rgba(255,255,255,0.05);
  --card-light: rgba(0,0,0,0.05);
}

body.dark {
  background: radial-gradient(circle at top, #1e293b, #0f172a);
  color: white;
}

body.light {
  background: linear-gradient(135deg, #f8fafc, #e2e8f0);
  color: #111827;
}

.glass {
  backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 20px;
  transition: all 0.4s ease;
}

body.dark .glass {
  background: var(--card-dark);
  border: 1px solid rgba(255,255,255,0.1);
}

body.light .glass {
  background: var(--card-light);
  border: 1px solid rgba(0,0,0,0.1);
}

/* Scan animation */
.scan-line {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 4px;
  background: linear-gradient(90deg,#3D4BFF,#7C3AED);
  animation: scan 1.5s ease-out forwards;
  z-index: 9999;
}

@keyframes scan {
  0% { top:0; opacity:1 }
  100% { top:100%; opacity:0 }
}

/* Hologram effect */
.hologram {
  animation: holo 3s infinite alternate ease-in-out;
}

@keyframes holo {
  from { filter: drop-shadow(0 0 5px #3D4BFF); }
  to { filter: drop-shadow(0 0 20px #7C3AED); }
}

/* Badge */
.badge {
  padding:6px 12px;
  border-radius:50px;
  font-size:12px;
  background:linear-gradient(45deg,#3D4BFF,#7C3AED);
  color:white;
  display:inline-block;
}
</style>

</head>

<body class="dark min-h-screen p-6">

<div class="scan-line"></div>

<div class="max-w-md mx-auto space-y-6">

  <div class="flex justify-between items-center">
    <h1 class="text-2xl font-bold">AlgoTrust</h1>
    <button id="themeToggle"
            class="text-sm px-3 py-1 rounded-full bg-indigo-500 text-white">
      Mode
    </button>
  </div>

  <!-- SCORE -->
  <div class="glass hologram text-center">

    <div id="trustScore"
         class="text-5xl font-bold">
      0
    </div>

    <div id="trustLevel"
         class="text-sm opacity-70 mt-1">
      Analyse...
    </div>

  </div>

  <!-- BADGES -->
  <div class="glass">
    <div class="text-sm mb-2">Badges IA</div>
    <div id="badgesContainer" class="flex flex-wrap gap-2"></div>
  </div>

  <!-- GRAPH -->
  <div class="glass">
    <div class="text-sm mb-2">Projection 30 jours</div>
    <canvas id="predictionChart" height="120"></canvas>
  </div>

  <!-- ADMIN -->
  <div id="adminSection"
       class="glass hidden border border-red-500">
    <div class="text-red-400 text-sm font-semibold">
      ADMIN INTELLIGENCE
    </div>
    <div id="adminData" class="text-sm mt-2"></div>
  </div>

</div>

</body>
</html>
