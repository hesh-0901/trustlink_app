<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>AlgoTrust - TrustLink</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="module" src="/trustlink_app/js/firebase-init.js"></script>
<script type="module" src="/trustlink_app/js/algotrust.js"></script>

<style>
body {
  background:#EEF2FF;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}
.card {
  border-radius:24px;
  background:white;
  box-shadow:0 25px 60px rgba(0,0,0,0.06);
}
</style>
</head>

<body class="min-h-screen pb-24">

<main class="max-w-md mx-auto px-5 pt-8 space-y-6">

<h1 class="text-xl font-bold text-gray-800">
AlgoTrust Engine
</h1>

<!-- SCORE CARD -->
<div class="card p-6 text-center">
  <canvas id="engineChart" width="200" height="200"></canvas>
  <p class="mt-4 text-sm text-gray-500">
    Intégrité transactionnelle
  </p>
</div>

<!-- PERFORMANCE -->
<div class="card p-6">
  <h2 class="text-sm font-semibold mb-4">
    Activité Système
  </h2>
  <canvas id="activityChart"></canvas>
</div>

<!-- STATS -->
<div class="grid grid-cols-2 gap-4">

  <div class="card p-4">
    <p class="text-xs text-gray-400">Transactions</p>
    <p id="totalTx" class="text-lg font-bold">0</p>
  </div>

  <div class="card p-4">
    <p class="text-xs text-gray-400">En attente</p>
    <p id="pendingTx" class="text-lg font-bold">0</p>
  </div>

  <div class="card p-4">
    <p class="text-xs text-gray-400">Volume USD</p>
    <p id="volumeUSD" class="text-lg font-bold">$0</p>
  </div>

  <div class="card p-4">
    <p class="text-xs text-gray-400">Volume CDF</p>
    <p id="volumeCDF" class="text-lg font-bold">0 CDF</p>
  </div>

</div>

</main>
</body>
</html>
