<style>
body {
  background: #EEF2FF;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

.swipe-container {
  display: flex;
  gap: 16px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
}

.swipe-container::-webkit-scrollbar {
  display: none;
}

.swipe-item {
  min-width: 100%;
  scroll-snap-align: center;
}

/* ===============================
   WALLET CARD BASE
================================= */

.wallet-card {
  border-radius: 28px;
  padding: 24px;
  position: relative;
  overflow: hidden;
  color: white;
  box-shadow:
    0 25px 60px rgba(0, 0, 0, 0.25),
    0 10px 20px rgba(0, 0, 0, 0.12);
}

/* Texture subtile */
.wallet-card::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size: 6px 6px;
  opacity: 0.25;
}

/* Reflet léger */
.wallet-card::after {
  content: "";
  position: absolute;
  top: -40%;
  left: -20%;
  width: 140%;
  height: 140%;
  background: radial-gradient(
    circle at top left,
    rgba(255,255,255,0.25),
    transparent 60%
  );
  transform: rotate(20deg);
}

/* ===============================
   USD STYLE (plus profond)
================================= */

.gradient-usd {
  background: linear-gradient(
    135deg,
    #0B158A 0%,
    #1A28C9 40%,
    #3C4BFF 100%
  );
}

/* ===============================
   CDF STYLE (plus vibrant)
================================= */

.gradient-cdf {
  background: linear-gradient(
    135deg,
    #2E3EFF 0%,
    #5F73FF 45%,
    #9DAAFF 100%
  );
}

/* Empêche le scroll derrière le modal */
body.modal-open {
  overflow: hidden;
}
</style>

</head>

<script type="module">
async function loadNavbar() {

}

<script type="module">
async function loadHeader() {

  const html = await res.text();
  document.getElementById("header-container").innerHTML = html;
  await import("../main_js/header.js");
}
loadHeader();
</script>

  <script>
/* ===============================
   SWIPE 3D EFFECT
================================= */

const container =
  document.getElementById("walletSwipe");

const items =
  container.querySelectorAll(".swipe-item");

container.addEventListener("scroll", () => {

  const scrollLeft =
    container.scrollLeft;

  const width =
    container.offsetWidth;

  const index =
    Math.round(scrollLeft / width);

  items.forEach((item, i) => {
    item.classList.toggle("active", i === index);
  });

});
</script>
