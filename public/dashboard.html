/* ===============================
   SWIPE CONTAINER
================================= */

.swipe-container {
  display: flex;
  gap: 20px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 20px;
  perspective: 1200px;
}

.swipe-container::-webkit-scrollbar {
  display: none;
}

.swipe-item {
  min-width: 100%;
  scroll-snap-align: center;
  transition: transform 0.4s ease, opacity 0.4s ease;
}

/* ===============================
   WALLET CARD
================================= */

.wallet-card {
  border-radius: 32px;
  padding: 30px;
  position: relative;
  overflow: hidden;
  color: white;
  transform-style: preserve-3d;
  transition: transform 0.5s ease, box-shadow 0.5s ease;
  box-shadow:
    0 25px 50px rgba(0, 0, 0, 0.25),
    0 12px 24px rgba(0, 0, 0, 0.12);
}

/* Reflet lumineux premium */
.wallet-card::before {
  content: "";
  position: absolute;
  top: -60%;
  left: -20%;
  width: 150%;
  height: 150%;
  background: radial-gradient(
    circle at top left,
    rgba(255,255,255,0.35),
    transparent 60%
  );
  transform: rotate(25deg);
}

/* Clé décorative arrière-plan */
.wallet-card::after {
  content: "🔑";
  position: absolute;
  right: 20px;
  bottom: 20px;
  font-size: 80px;
  opacity: 0.08;
  transform: rotate(-20deg);
}

/* ===============================
   GRADIENTS
================================= */

.gradient-usd {
  background: linear-gradient(
    135deg,
    #0F1ACD 0%,
    #1E2BE0 40%,
    #4A5BFF 100%
  );
}

.gradient-cdf {
  background: linear-gradient(
    135deg,
    #2E3EFF 0%,
    #5C6EFF 50%,
    #8EA0FF 100%
  );
}

/* ===============================
   SCROLL ANIMATION
================================= */

.swipe-item.active {
  transform: scale(1.02) rotateY(0deg);
  opacity: 1;
}

.swipe-item:not(.active) {
  transform: scale(0.95) rotateY(10deg);
  opacity: 0.8;
}

/* ===============================
   CARD NUMBER STYLE
================================= */

.card-number {
  letter-spacing: 3px;
  font-size: 18px;
  margin-top: 25px;
  opacity: 0.9;
}

.currency-icon {
  font-size: 22px;
  opacity: 0.85;
}
</style>

  <script>
/* ===============================
   SWIPE 3D EFFECT
================================= */

const container =
  document.getElementById("walletSwipe");

const items =
  container.querySelectorAll(".swipe-item");

container.addEventListener("scroll", () => {

  const scrollLeft =
    container.scrollLeft;

  const width =
    container.offsetWidth;

  const index =
    Math.round(scrollLeft / width);

  items.forEach((item, i) => {
    item.classList.toggle("active", i === index);
  });

});
</script>
