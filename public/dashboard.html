<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<title>Dashboard - TrustLink</title>

<!-- html2canvas -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: "#1E2BE0",
        primaryStrong: "#0F1ACD",
        primaryLight: "#3D4BFF",
        background: "#EEF2FF"
      }
    }
  }
}
</script>

<script type="module" src="/trustlink_app/js/firebase-init.js"></script>
<script type="module" src="../public/js/dashboard.js"></script>
<style>
body {
  background: #EEF2FF;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

.swipe-container {
  display: flex;
  gap: 18px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 10px;
}

.swipe-container::-webkit-scrollbar {
  display: none;
}

.swipe-item {
  min-width: 100%;
  scroll-snap-align: center;
}

.wallet-card {
  border-radius: 30px;
  padding: 28px;
  position: relative;
  overflow: hidden;
  color: white;
  box-shadow:
    0 20px 40px rgba(15, 26, 205, 0.25),
    0 8px 16px rgba(0, 0, 0, 0.08);
  backdrop-filter: blur(8px);
}

/* Reflet lumineux réaliste */
.wallet-card::before {
  content: "";
  position: absolute;
  top: -40%;
  left: -20%;
  width: 140%;
  height: 140%;
  background: radial-gradient(
    circle at top left,
    rgba(255,255,255,0.35),
    transparent 60%
  );
  transform: rotate(25deg);
}

/* Gradient USD (plus profond et riche) */
.gradient-usd {
  background: linear-gradient(
    135deg,
    #0F1ACD 0%,
    #1E2BE0 45%,
    #4A5BFF 100%
  );
}

/* Gradient CDF (plus vibrant et lumineux) */
.gradient-cdf {
  background: linear-gradient(
    135deg,
    #2D3BFF 0%,
    #5368FF 50%,
    #7A8CFF 100%
  );
}

/* Empêche scroll derrière modal */
body.modal-open {
  overflow: hidden;
}
</style>

</head>

<body class="min-h-screen">

<!-- HEADER FIXE -->
<div id="header-container"
     class="fixed top-0 left-0 w-full z-50 bg-transparent"></div>

<!-- CONTENU -->
<main class="max-w-md mx-auto px-6 pt-28 pb-36">

  <!-- SWIPE WALLETS -->
  <section class="swipe-container mb-12">

    <!-- USD CARD -->
    <div class="swipe-item">
      <div class="wallet-card gradient-usd">

        <div class="flex justify-between items-center mb-8">
          <img src="/trustlink_app/assets/white.logo.png"
               class="h-8"> <!-- logo agrandi -->
          <span class="text-sm opacity-90 font-semibold tracking-wide">
            USD
          </span>
        </div>

        <p class="text-sm opacity-80 mb-3">
          Solde disponible
        </p>

        <h2 id="balanceUSD"
            class="text-4xl font-bold tracking-tight">
          $0
        </h2>

      </div>
    </div>

    <!-- CDF CARD -->
    <div class="swipe-item">
      <div class="wallet-card gradient-cdf">

        <div class="flex justify-between items-center mb-8">
          <img src="/trustlink_app/assets/white.logo.png"
               class="h-8"> <!-- logo agrandi -->
          <span class="text-sm opacity-90 font-semibold tracking-wide">
            CDF
          </span>
        </div>

        <p class="text-sm opacity-80 mb-3">
          Solde disponible
        </p>

        <h2 id="balanceCDF"
            class="text-4xl font-bold tracking-tight">
          0 CDF
        </h2>

      </div>
    </div>

  </section>

  <!-- ACTIONS RAPIDES -->
  <section class="mb-10">

    <div class="flex justify-between items-center mb-4">
      <h3 class="text-base font-semibold">
        Actions rapides
      </h3>
      <button id="toggleActions"
              class="text-lg font-bold text-primaryStrong">
        ...
      </button>
    </div>

    <div class="grid grid-cols-3 gap-4">
      <!-- LIGNE PRINCIPALE -->
      <!-- (inchangé) -->
  <a href="./actions/transferer.html"
     class="bg-white rounded-2xl p-4 flex flex-col items-center gap-2 shadow active:scale-95 transition">
    <div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center">
      <i class="bi bi-arrow-left-right text-primaryStrong text-xl"></i>
    </div>
    <span class="text-xs font-medium text-gray-700">
      Transférer
    </span>
  </a>

  <a href="./actions/recevoir.html"
     class="bg-white rounded-2xl p-4 flex flex-col items-center gap-2 shadow active:scale-95 transition">
    <div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center">
      <i class="bi bi-qr-code text-primaryStrong text-xl"></i>
    </div>
    <span class="text-xs font-medium text-gray-700">
      Recevoir
    </span>
  </a>

  <a href="./actions/deposer.html"
     class="bg-white rounded-2xl p-4 flex flex-col items-center gap-2 shadow active:scale-95 transition">
    <div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center">
      <i class="bi bi-plus-circle text-primaryStrong text-xl"></i>
    </div>
    <span class="text-xs font-medium text-gray-700">
      Déposer
    </span>
  </a>

</div>
    </div>

    <div id="extraActions"
         class="grid grid-cols-3 gap-4 mt-4 hidden">
      <!-- (inchangé) -->
      <a href="./actions/approbation.html"
   class="bg-white rounded-2xl p-4 flex flex-col items-center gap-2 shadow active:scale-95 transition">
  <div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center">
    <i class="bi bi-check2-circle text-primaryStrong text-xl"></i>
  </div>
  <span class="text-xs font-medium text-gray-700">
    Approbation
  </span>
</a>

<a href="./actions/gestion-dettes.html"
   class="bg-white rounded-2xl p-4 flex flex-col items-center gap-2 shadow active:scale-95 transition">
  <div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center">
    <i class="bi bi-journal-text text-primaryStrong text-xl"></i>
  </div>
  <span class="text-xs font-medium text-gray-700">
    Dettes
  </span>
</a>

<a href="./actions/previsions.html"
   class="bg-white rounded-2xl p-4 flex flex-col items-center gap-2 shadow active:scale-95 transition">
  <div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center">
    <i class="bi bi-graph-up text-primaryStrong text-xl"></i>
  </div>
  <span class="text-xs font-medium text-gray-700">
    Prévisions
  </span>
</a>

<a href="./actions/sorties.html"
   class="bg-white rounded-2xl p-4 flex flex-col items-center gap-2 shadow active:scale-95 transition">
  <div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center">
    <i class="bi bi-wallet2 text-primaryStrong text-xl"></i>
  </div>
  <span class="text-xs font-medium text-gray-700">
    Sorties
  </span>
</a>

<a href="./actions/historique.html"
   class="bg-white rounded-2xl p-4 flex flex-col items-center gap-2 shadow active:scale-95 transition">
  <div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center">
    <i class="bi bi-clock-history text-primaryStrong text-xl"></i>
  </div>
  <span class="text-xs font-medium text-gray-700">
    Historique
  </span>
</a>

<a href="./actions/beneficiaires.html"
   class="bg-white rounded-2xl p-4 flex flex-col items-center gap-2 shadow active:scale-95 transition">
  <div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center">
    <i class="bi bi-person-lines-fill text-primaryStrong text-xl"></i>
  </div>
  <span class="text-xs font-medium text-gray-700">
    Bénéficiaires
  </span>
</a>
    </div>

  </section>

  <!-- NOTIFICATIONS -->
  <section>

    <div class="flex justify-between items-center mb-4">
      <h3 class="text-base font-semibold">
        Notifications
      </h3>
    </div>

    <div id="transactionsList"
         class="space-y-3">
    </div>

  </section>

</main>

<!-- NAVBAR FIXE -->
<div id="navbar-container"
     class="fixed bottom-0 left-0 w-full z-50 bg-transparent"></div>

<script>
document.getElementById("toggleActions")
  .addEventListener("click", () => {
    document.getElementById("extraActions")
      .classList.toggle("hidden");
});
</script>

<script type="module">
async function loadNavbar() {
  const res = await fetch("/trustlink_app/partials/nav.html");
  const data = await res.text();
  document.getElementById("navbar-container").innerHTML = data;
}
loadNavbar();
</script>

<script type="module">
async function loadHeader() {
  const res = await fetch("../partials/header.html");
  const html = await res.text();
  document.getElementById("header-container").innerHTML = html;
  await import("../main_js/header.js");
}
loadHeader();
</script>

</body>
</html>
