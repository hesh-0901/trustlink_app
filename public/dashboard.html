<style>
body {
  background: #EEF2FF;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

.swipe-container {
  display: flex;
  gap: 16px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
}

.swipe-container::-webkit-scrollbar {
  display: none;
}

.swipe-item {
  min-width: 100%;
  scroll-snap-align: center;
}

/* ===============================
   WALLET CARD BASE
================================= */

.wallet-card {
  border-radius: 28px;
  padding: 24px;
  position: relative;
  overflow: hidden;
  color: white;
  box-shadow:
    0 20px 45px rgba(0,0,0,0.25),
    0 8px 20px rgba(0,0,0,0.12);
}

/* Texture fond */
.wallet-card::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size: 7px 7px;
  opacity: 0.25;
}

/* Reflet premium */
.wallet-card::after {
  content: "";
  position: absolute;
  top: -50%;
  left: -30%;
  width: 150%;
  height: 150%;
  background: radial-gradient(
    circle at top left,
    rgba(255,255,255,0.25),
    transparent 60%
  );
  transform: rotate(25deg);
}

/* ===============================
   USD (plus clair)
================================= */

.gradient-usd {
  background: linear-gradient(
    135deg,
    #1E2BE0 0%,
    #3F4FFF 50%,
    #6C7CFF 100%
  );
}

/* ===============================
   CDF (plus foncé que USD)
================================= */

.gradient-cdf {
  background: linear-gradient(
    135deg,
    #0C1585 0%,
    #1522B8 50%,
    #2534D6 100%
  );
}

/* Montant mis en avant */
.balance-amount {
  font-size: 34px;
  font-weight: 800;
  letter-spacing: -1px;
  margin-top: 6px;
}

.wallet-base {
  font-size: 13px;
  opacity: 0.85;
  margin-top: 14px;
  letter-spacing: 1px;
}
</style>

</head>

<script>
document.getElementById("toggleActions")

<script type="module">
async function loadNavbar() {
  const res = await fetch("/trustlink_app/partials/nav.html");
  const data = await res.text();
  document.getElementById("navbar-container").innerHTML = data;
}
loadNavbar();
</script>

<script type="module">
async function loadHeader() {
  const res = await fetch("../partials/header.html");
  const html = await res.text();
  document.getElementById("header-container").innerHTML = html;
  await import("../main_js/header.js");
}
loadHeader();
</script>

  <script>
/* ===============================
   SWIPE 3D EFFECT
================================= */

const container =
  document.getElementById("walletSwipe");

const items =
  container.querySelectorAll(".swipe-item");

container.addEventListener("scroll", () => {

  const scrollLeft =
    container.scrollLeft;

  const width =
    container.offsetWidth;

  const index =
    Math.round(scrollLeft / width);

  items.forEach((item, i) => {
    item.classList.toggle("active", i === index);
  });

});
</script>
