<style>
body {
  background: #EEF2FF;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

.swipe-container {
  display: flex;
  gap: 16px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
}

.swipe-container::-webkit-scrollbar {
  display: none;
}

.swipe-item {
  min-width: 100%;
  scroll-snap-align: center;
}

/* ===============================
   WALLET CARD BASE
================================= */

.wallet-card {
  border-radius: 28px;
  padding: 24px;
  position: relative;
  overflow: hidden;
  color: white;

  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);

  border: 1px solid rgba(255,255,255,0.15);

  box-shadow:
    0 15px 35px rgba(15, 26, 205, 0.25),
    0 5px 15px rgba(0,0,0,0.08);

  transition:
    transform 0.25s ease,
    box-shadow 0.25s ease;
}

/* Glow léger */
.wallet-card:hover {
  transform: translateY(-4px);
  box-shadow:
    0 20px 45px rgba(61, 75, 255, 0.35),
    0 10px 25px rgba(0,0,0,0.12);
}

/* Animation mobile tap */
.wallet-card:active {
  transform: scale(0.98);
}

/* Motif signature TrustLink */
.wallet-card::before {
  content: "TL";
  position: absolute;
  right: 18px;
  bottom: 12px;
  font-size: 90px;
  font-weight: 700;
  opacity: 0.05;
  letter-spacing: -8px;
}

/* Texture très subtile */
.wallet-card::after {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 8px 8px;
  pointer-events: none;
}

/* ===============================
   USD STYLE (plus profond & premium)
================================= */

.gradient-usd {
  background: linear-gradient(
    135deg,
    #0E1AB8 0%,
    #1E2BE0 45%,
    #2F3FFF 100%
  );
}

/* ===============================
   CDF STYLE (plus doux & moderne)
================================= */

.gradient-cdf {
  background: linear-gradient(
    135deg,
    #4A5BFF 0%,
    #6C7DFF 50%,
    #9CA8FF 100%
  );
}

body.modal-open {
  overflow: hidden;
}
</style>

</head>

<script type="module">

<script type="module">
async function loadHeader() {

  const html = await res.text();
  document.getElementById("header-container").innerHTML = html;
  await import("../main_js/header.js");
}
loadHeader();
</script>

  <script>
/* ===============================
   SWIPE 3D EFFECT
================================= */

const container =
  document.getElementById("walletSwipe");

const items =
  container.querySelectorAll(".swipe-item");

container.addEventListener("scroll", () => {

  const scrollLeft =
    container.scrollLeft;

  const width =
    container.offsetWidth;

  const index =
    Math.round(scrollLeft / width);

  items.forEach((item, i) => {
    item.classList.toggle("active", i === index);
  });

});
</script>
