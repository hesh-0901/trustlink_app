<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Admin Control Center - TrustLink</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<script type="module" src="/trustlink_app/js/firebase-init.js"></script>
<script type="module" src="/trustlink_app/admin/admin-dashboard.js"></script>

<style>
body{
  background:#F6F8FC;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

.card{
  background:white;
  border-radius:24px;
  border:1px solid #EEF1F6;
}

.shadow-soft{
  box-shadow:0 10px 30px rgba(16,24,40,0.05);
}

.badge{
  padding:4px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:600;
}

.badge-user{ background:#F3F4F6; color:#6B7280; }
.badge-admin{ background:#DBEAFE; color:#1E40AF; }
.badge-super{ background:#EDE9FE; color:#6D28D9; }

.section-title{
  font-size:14px;
  font-weight:600;
  color:#111827;
}
</style>
</head>

<body class="min-h-screen pb-20">

<main class="max-w-6xl mx-auto px-6 pt-10 space-y-10">

<!-- HEADER -->
<header class="flex justify-between items-center">

  <div>
    <h1 class="text-2xl font-semibold text-gray-900 flex items-center gap-3">
      <i class="bi bi-shield-lock text-[#1E2BE0] text-2xl"></i>
      Admin Control Center
    </h1>
    <p class="text-sm text-gray-400 mt-1">
      Centre de pilotage global TrustLink
    </p>
  </div>

  <div class="text-sm text-gray-500">
    Rôle :
    <span id="adminRoleBadge" class="badge badge-admin">
      admin
    </span>
  </div>

</header>

<!-- OVERVIEW -->
<section class="grid md:grid-cols-4 gap-6">

  <div class="card shadow-soft p-6 text-center">
    <i class="bi bi-people text-3xl text-[#1E2BE0]"></i>
    <p class="text-xs text-gray-400 mt-3">Utilisateurs</p>
    <p id="totalUsers" class="text-xl font-semibold mt-1">0</p>
  </div>

  <div class="card shadow-soft p-6 text-center">
    <i class="bi bi-wallet2 text-3xl text-emerald-600"></i>
    <p class="text-xs text-gray-400 mt-3">Wallets</p>
    <p id="totalWallets" class="text-xl font-semibold mt-1">0</p>
  </div>

  <div class="card shadow-soft p-6 text-center">
    <i class="bi bi-arrow-left-right text-3xl text-indigo-600"></i>
    <p class="text-xs text-gray-400 mt-3">Transactions</p>
    <p id="totalTransactions" class="text-xl font-semibold mt-1">0</p>
  </div>

  <div class="card shadow-soft p-6 text-center">
    <i class="bi bi-exclamation-triangle text-3xl text-amber-500"></i>
    <p class="text-xs text-gray-400 mt-3">Pending</p>
    <p id="pendingTransactions" class="text-xl font-semibold mt-1">0</p>
  </div>

</section>

<!-- USER MANAGEMENT -->
<section class="card shadow-soft p-6 space-y-6">

  <div class="flex justify-between items-center">
    <h2 class="section-title flex items-center gap-2">
      <i class="bi bi-person-gear text-[#1E2BE0]"></i>
      Gestion des utilisateurs
    </h2>
  </div>

  <div class="overflow-x-auto">

    <table class="w-full text-sm">
      <thead class="text-left text-gray-400">
        <tr>
          <th>Nom</th>
          <th>Téléphone</th>
          <th>Rôle</th>
          <th>Statut</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody id="usersTable" class="text-gray-700">
      </tbody>

    </table>

  </div>

</section>

<!-- TRANSACTION CONTROL -->
<section class="card shadow-soft p-6 space-y-6">

  <h2 class="section-title flex items-center gap-2">
    <i class="bi bi-cash-coin text-indigo-600"></i>
    Supervision des transactions
  </h2>

  <div id="transactionsTable"
       class="space-y-4">
  </div>

</section>

</main>

</body>
</html>
